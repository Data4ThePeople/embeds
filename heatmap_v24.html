<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>State reliance on Medicaid care economy job growth</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f4ef;
  --bg-tertiary: #efece4;
  --text-primary: #1a1a1a;
  --text-secondary: #555550;
  --text-tertiary: #888880;
  --border: rgba(0,0,0,0.12);
  --border-strong: rgba(0,0,0,0.25);
  --accent-red: #A50F15;
  --pos-green: #3B6D11;
  --neg-red: #A32D2D;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a1a;
    --bg-secondary: #232220;
    --bg-tertiary: #2c2c2a;
    --text-primary: #e8e6df;
    --text-secondary: #a8a59b;
    --text-tertiary: #6b6962;
    --border: rgba(255,255,255,0.12);
    --border-strong: rgba(255,255,255,0.25);
    --accent-red: #E24B4A;
    --pos-green: #97C459;
    --neg-red: #E24B4A;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg-primary); }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
  color: var(--text-primary);
  padding: 20px;
  max-width: 1100px;
  margin: 0 auto;
  line-height: 1.5;
}
.hdr { margin-bottom: 16px; }
.hdr h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; line-height: 1.25; }
.hdr p { font-size: 13px; color: var(--text-secondary); max-width: 700px; }

/* Controls — desktop is single row; mobile stacks vertically */
.ctrls {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1.6fr;
  gap: 14px;
  margin-bottom: 14px;
  padding: 14px;
  background: var(--bg-secondary);
  border-radius: 10px;
}
.ctrl-grp { display: flex; flex-direction: column; gap: 6px; }
.ctrl-grp label {
  font-size: 11px; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;
}
.ctrl-grp select {
  font-size: 14px; padding: 9px 11px;
  background: var(--bg-primary); color: var(--text-primary);
  border: 0.5px solid var(--border); border-radius: 7px;
  font-family: inherit; cursor: pointer; width: 100%;
  -webkit-appearance: none; appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M0 0l5 6 5-6z' fill='%23555'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 30px;
  min-height: 40px;
}
.qtr-row { display: flex; align-items: center; gap: 10px; }
.qtr-row input[type=range] { flex: 1; cursor: pointer; min-width: 0; height: 28px; }
.qtr-display {
  font-size: 13px; font-weight: 600; color: var(--text-primary);
  font-variant-numeric: tabular-nums; min-width: 140px;
  background: var(--bg-primary);
  padding: 7px 8px; border-radius: 6px;
  text-align: center;
  border: 0.5px solid var(--border);
}
#play-btn {
  font-size: 13px; font-family: inherit;
  background: var(--bg-primary); color: var(--text-primary);
  border: 0.5px solid var(--border); border-radius: 7px;
  width: 40px; height: 40px;
  cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.1s; line-height: 1;
  flex-shrink: 0;
}
#play-btn:hover { border-color: var(--border-strong); }
#play-btn.playing { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
.speed-row {
  display: flex; align-items: center; gap: 6px; margin-top: 6px;
  font-size: 11px; color: var(--text-secondary);
}
.speed-pill {
  font-size: 11px; padding: 5px 10px;
  background: var(--bg-primary); color: var(--text-secondary);
  border: 0.5px solid var(--border); border-radius: 6px;
  cursor: pointer; font-family: inherit; transition: all 0.1s;
  min-height: 28px;
}
.speed-pill:hover { border-color: var(--border-strong); }
.speed-pill.active { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }

.period-pills { display: flex; gap: 4px; }
.period-pill {
  flex: 1; padding: 10px 4px; font-size: 13px;
  background: var(--bg-primary); color: var(--text-secondary);
  border: 0.5px solid var(--border); border-radius: 7px;
  cursor: pointer; text-align: center; font-family: inherit;
  transition: all 0.1s; min-height: 40px;
}
.period-pill:hover { border-color: var(--border-strong); }
.period-pill.active { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); font-weight: 500; }

.tick-marks { position: relative; height: 14px; margin-top: -2px; font-size: 9px; color: var(--text-tertiary); }
.tick { position: absolute; transform: translateX(-50%); white-space: nowrap; }

/* Legend */
.legend { margin-bottom: 16px; }
.legend-title { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
.legend-title strong { color: var(--text-primary); font-weight: 500; }
.legend-tiers { display: grid; grid-template-columns: repeat(9, 1fr); gap: 3px; }
.lt { display: flex; flex-direction: column; gap: 3px; }
.lt-sw { height: 12px; border-radius: 2px; }
.lt-rng { font-size: 10px; color: var(--text-secondary); font-variant-numeric: tabular-nums; line-height: 1.2; }
.lt-ext { font-size: 9px; color: var(--text-tertiary); line-height: 1.2; margin-top: 1px; }

/* Map */
.map-wrap { position: relative; width: 100%; }
#map svg { display: block; width: 100%; height: auto; }
.state {
  cursor: pointer;
  transition: opacity 0.1s;
  stroke: rgba(0,0,0,0.55);
  stroke-width: 0.8;
}
.state:hover { opacity: 0.85; }
.state.selected { stroke: var(--text-primary); stroke-width: 2; }
@media (prefers-color-scheme: dark) {
  .state { stroke: rgba(255,255,255,0.55); }
}

/* Detail panel */
.detail {
  margin-top: 20px;
  padding-top: 18px;
  border-top: 0.5px solid var(--border);
}
.detail-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
.detail-meta { font-size: 11px; color: var(--text-secondary); margin-bottom: 10px; }
.detail-body { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }
.detail-body p { margin: 8px 0; }

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 12px;
  margin: 10px 0;
  padding: 10px;
  background: var(--bg-secondary);
  border-radius: 8px;
}
.sl { font-size: 10px; color: var(--text-secondary); line-height: 1.3; }
.sv { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-top: 2px; font-variant-numeric: tabular-nums; }
.sv.extreme { color: var(--accent-red); font-size: 13px; }

.tt-breakdown {
  margin: 8px 0;
  padding: 8px 10px;
  background: var(--bg-tertiary);
  border-radius: 6px;
  font-size: 12px;
}
.tt-bd-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 3px 0;
}
.tt-bd-row + .tt-bd-row {
  border-top: 0.5px solid var(--border);
  margin-top: 3px;
  padding-top: 6px;
}
.tt-bd-label { color: var(--text-secondary); }
.tt-bd-val { font-weight: 600; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.tt-bd-val.pos { color: var(--pos-green); }
.tt-bd-val.neg { color: var(--neg-red); }
.tt-callout {
  font-size: 11px;
  color: var(--text-secondary);
  font-style: italic;
  padding: 6px 0 0;
  line-height: 1.4;
}

.tt-chart-label { font-size: 10px; color: var(--text-secondary); margin-top: 10px; margin-bottom: 4px; }
#tt-chart {
  width: 100%;
  height: auto;
  aspect-ratio: 16 / 3;
  display: block;
}

.mobile-only-disclaimer {
  display: none;
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 10px;
  padding: 8px 10px;
  background: var(--bg-secondary);
  border-radius: 6px;
  font-style: italic;
}

/* Methodology */
.notes {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 20px;
  line-height: 1.6;
  padding-top: 14px;
  border-top: 0.5px solid var(--border);
}
.notes strong { color: var(--text-primary); font-weight: 500; }
.methodology-link {
  color: var(--text-primary);
  text-decoration: underline;
  font-weight: 500;
}

/* Logo / credit bar */
.credit-bar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  margin-top: 16px;
  padding-top: 14px;
  border-top: 0.5px solid var(--border);
}
.d4tp-logo {
  display: inline-block;
  text-decoration: none;
  opacity: 0.85;
  transition: opacity 0.15s;
}
.d4tp-logo:hover { opacity: 1; }
.d4tp-logo svg { display: block; height: 26px; width: auto; }
.logo-light-mode { display: inline-block; }
.logo-dark-mode { display: none; }
@media (prefers-color-scheme: dark) {
  .logo-light-mode { display: none; }
  .logo-dark-mode { display: inline-block; }
}

/* Responsive — mobile layout */
@media (max-width: 700px) {
  body { padding: 14px; }
  .hdr h1 { font-size: 18px; }
  .hdr p { font-size: 12px; }
  .ctrls {
    grid-template-columns: 1fr;
    gap: 12px;
    padding: 12px;
  }
  .legend-tiers {
    grid-template-columns: repeat(3, 1fr);
    gap: 6px 6px;
  }
  .lt-rng { font-size: 9px; }
  .lt-ext { font-size: 8px; }
  .tick-marks { font-size: 8px; }
  .stat-grid { gap: 6px 8px; padding: 9px; }
  .sv { font-size: 14px; }
  .tt-chart-label, #tt-chart { display: none; }
  .mobile-only-disclaimer { display: block; }
  .qtr-display { min-width: 130px; font-size: 12px; }
}
</style>
</head>

<div class="hdr">
  <h1 id="page-title"></h1>

</div>

    <select id="ind-sel"></select>

quarter to same-quarter (e.g., Q3 2023 \u2192 Q3 2025) to avoid seasonality artifacts. The color scale is fixed across all industries and time windows so values are directly comparable. The 30% threshold for \"critical reliance\" is drawn from the single-sector dependence literature in regional economics (notably oil & gas state studies), where one industry accounting for 30%+ of net job growth is considered a structural vulnerability. Values above 100% indicate the industry grew while other sectors shed jobs over the window. Industry employment is from BLS QCEW (Quarterly Census of Employment and Wages); state-total employment denominators are from BLS CES (Current Employment Statistics) to avoid QCEW cell-suppression artifacts. State-level CES is benchmarked to QCEW annually and may drift slightly between benchmarks; comparisons across states use the same methodology consistently.", "mobileTrendDisclaimer": "View on desktop for the full quarterly employment trend chart."}</script>

<!-- D3 + topojson (CDN-only; if your network blocks CDNs the map may not render) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>
// =============================================================================
// Load data + config from inlined JSON
// =============================================================================
const DATA = JSON.parse(document.getElementById('data-payload').textContent);
const TEXTS = JSON.parse(document.getElementById('texts-payload').textContent);
const CC = JSON.parse(document.getElementById('color-payload').textContent);
const PC = JSON.parse(document.getElementById('period-payload').textContent);
const DQ_FLAGS = JSON.parse(document.getElementById('dq-flags').textContent);
const TOPOLOGY_INLINE = JSON.parse(document.getElementById('topology-inline').textContent);

const COLORS = CC.colors;
const THRESHOLDS = CC.thresholds;
const MISSING_LIGHT = CC.missingLight;
const MISSING_DARK = CC.missingDark;

const QS = DATA.q;
const NUM_Q = QS.length;

let currentGroup = DATA.g[0];
let currentPeriod = PC.defaultPeriod;
let currentEndIdx = NUM_Q - 1;
let selectedState = null;

// Apply all editorial text strings to their DOM nodes
function applyTexts() {
  document.title = TEXTS.pageTitle;
  document.getElementById('page-title').textContent = TEXTS.pageTitle;
  document.getElementById('page-subtitle').textContent = TEXTS.pageSubtitle;
  document.getElementById('lbl-industry').textContent = TEXTS.labelIndustry;
  document.getElementById('lbl-window').textContent = TEXTS.labelWindow;
  document.getElementById('lbl-endquarter').textContent = TEXTS.labelEndQuarter;
  document.getElementById('lbl-speed').textContent = TEXTS.labelSpeed + ':';
  document.getElementById('lt-prefix').textContent = TEXTS.legendTitlePrefix;
  document.getElementById('methodology-note').textContent = TEXTS.methodologyNote;
  const ml = document.getElementById('methodology-link');
  ml.textContent = TEXTS.methodologyLinkText;
  ml.href = TEXTS.methodologyLinkUrl;
  document.getElementById('play-btn').setAttribute('aria-label', TEXTS.labelPlay);
}

// =============================================================================
// Helpers
// =============================================================================
function qidLabel(qid) {
  const y = Math.floor(qid / 10);
  const q = qid % 10;
  return y + ' Q' + q;
}
function qidShort(qid) {
  const y = String(Math.floor(qid / 10)).slice(2);
  const q = qid % 10;
  return "'" + y + ' Q' + q;
}

function fmtPct(v) {
  if (v == null) return '—';
  return (v * 100).toFixed(1) + '%';
}

function fmtN(v) {
  if (v == null) return '—';
  if (Math.abs(v) >= 1000000) return (v / 1000000).toFixed(2) + 'M';
  if (Math.abs(v) >= 1000) return (v / 1000).toFixed(0) + 'k';
  return v.toString();
}

function fmtDelta(v) {
  if (v == null) return '—';
  const sign = v >= 0 ? '+' : '−';
  const abs = Math.abs(v);
  if (abs >= 1000000) return sign + (abs / 1000000).toFixed(2) + 'M';
  if (abs >= 1000) return sign + (abs / 1000).toFixed(1) + 'k';
  return sign + abs.toString();
}

function isDarkMode() {
  return matchMedia('(prefers-color-scheme: dark)').matches;
}

// =============================================================================
// Compute share-of-growth for a state-industry-window
// =============================================================================
function getValue(stateName, group, periodQ, endIdx) {
  const sd = DATA.s[stateName];
  if (!sd) return null;
  const gArr = sd.g[group];
  if (!gArr) return null;
  const startIdx = endIdx - periodQ;
  if (startIdx < 0) return null;
  const indEnd = gArr[endIdx];
  const indStart = gArr[startIdx];
  const totEnd = sd.t[endIdx];
  const totStart = sd.t[startIdx];
  if (!totEnd || !totStart || !indEnd || !indStart) return null;
  const indDelta = indEnd - indStart;
  const totDelta = totEnd - totStart;

  // Edge-case classification:
  //   - state grew, industry grew → normal positive ratio (0 to 100%+)
  //   - state grew, industry shrank → INDUSTRY DECLINING: industry was a drag,
  //     not a contributor. We surface this as a special case rather than a
  //     "negative %" since "the industry contributed −76% of growth" is not a
  //     meaningful narrative — the state grew despite the sector, not because
  //     of it.
  //   - state shrank, industry grew → EXTREME RELIANCE: industry was the only
  //     growth engine over the window.
  //   - state shrank, industry shrank → both shrinking, industry contributed
  //     to decline.
  //   - state delta is exactly 0 → if industry grew, treat as EXTREME RELIANCE
  //     (industry-only growth — the math is undefined but the editorial story
  //     is identical to state-shrank case); if industry didn't grow, share = 0.
  let share_of_growth;
  let extreme_reliance = false;
  let declining_industry = false;
  if (totDelta === 0 && indDelta > 0) {
    // State was flat (often a rounding coincidence in CES), industry grew.
    // Editorially identical to "industry-only growth."
    share_of_growth = null;
    extreme_reliance = true;
  } else if (totDelta === 0 && indDelta < 0) {
    // State flat, industry shrank — industry declined.
    share_of_growth = 0;
    declining_industry = true;
  } else if (totDelta === 0) {
    // Both flat — no net movement either direction. Show as 0% share.
    share_of_growth = 0;
  } else if (totDelta < 0 && indDelta > 0) {
    share_of_growth = (indDelta / Math.abs(totDelta)) + 1;
    extreme_reliance = true;
  } else if (totDelta < 0 && indDelta <= 0) {
    // Both shrank — industry declined too. Group with industry-declining states.
    share_of_growth = 0;
    declining_industry = true;
  } else if (totDelta > 0 && indDelta < 0) {
    // State grew, industry shrank — industry is declining, not contributing.
    share_of_growth = 0;
    declining_industry = true;
  } else {
    share_of_growth = indDelta / totDelta;
  }

  // Trailing periodQ-quarter averages — used in detail panel.
  // "1-yr window" = trailing 4 quarters ending at endIdx (inclusive).
  let indSum = 0, totSum = 0, shareSum = 0, validCount = 0;
  for (let i = endIdx - periodQ + 1; i <= endIdx; i++) {
    if (i < 0) continue;
    const ind = gArr[i];
    const tot = sd.t[i];
    if (!ind || !tot) continue;
    indSum += ind;
    totSum += tot;
    shareSum += ind / tot;
    validCount++;
  }
  const ind_emp_avg = validCount > 0 ? indSum / validCount : null;
  const share_total_avg = validCount > 0 ? shareSum / validCount : null;

  return {
    share_of_growth,
    extreme_reliance,
    declining_industry,
    share_total_end: indEnd / totEnd,
    share_total_avg,
    ind_pct_growth: indStart > 0 ? (indEnd / indStart - 1) : null,
    ind_emp_end: indEnd,
    ind_emp_avg,
    ind_emp_start: indStart,
    ind_delta: indDelta,
    tot_delta: totDelta,
    start_qid: QS[startIdx],
    end_qid: QS[endIdx]
  };
}

function getColor(val, extreme, declining) {
  if (val == null || isNaN(val)) {
    if (extreme) return COLORS[COLORS.length - 1];
    if (declining) return '#FFFFFF';
    return isDarkMode() ? MISSING_DARK : MISSING_LIGHT;
  }
  if (extreme) return COLORS[COLORS.length - 1];
  if (declining) return '#FFFFFF';
  if (val < 0) return COLORS[0];
  let idx = 0;
  for (let i = THRESHOLDS.length - 1; i >= 0; i--) {
    if (val >= THRESHOLDS[i]) { idx = i; break; }
  }
  return COLORS[idx];
}

// =============================================================================
// UI setup
// =============================================================================
applyTexts();

// Industry dropdown — indent sub-groups under "Medicaid Care Economy"
const sel = document.getElementById('ind-sel');
DATA.g.forEach(g => {
  const o = document.createElement('option');
  o.value = g;
  // Indent everything except the top-level "Medicaid Care Economy" aggregate
  o.textContent = (g === 'Medicaid Care Economy') ? g : '\u00A0\u00A0\u00A0\u00A0' + g;
  sel.appendChild(o);
});

// Period pills
const periodPillsContainer = document.getElementById('period-pills');
PC.periodsQuarters.forEach(p => {
  const b = document.createElement('button');
  b.className = 'period-pill' + (p === currentPeriod ? ' active' : '');
  b.dataset.p = p;
  const years = p / 4;
  b.textContent = years + ' yr';
  b.addEventListener('click', () => {
    document.querySelectorAll('.period-pill').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentPeriod = parseInt(b.dataset.p);
    stopAnimation();
    updateSliderRange();
    update();
  });
  periodPillsContainer.appendChild(b);
});

// Legend tiers — fixed thresholds
function renderLegend() {
  const tiersEl = document.getElementById('legend-tiers');
  tiersEl.innerHTML = '';
  const labels = [
    {sw: '#FFFFFF', rng: 'Hatched', ext: TEXTS.legendDecliningLabel, hatchType: 'declining'},
    {sw: COLORS[0], rng: '0–2%', ext: null, hatchType: null},
    {sw: COLORS[1], rng: '2–5%', ext: null, hatchType: null},
    {sw: COLORS[2], rng: '5–10%', ext: null, hatchType: null},
    {sw: COLORS[3], rng: '10–20%', ext: null, hatchType: null},
    {sw: COLORS[4], rng: '20–30%', ext: null, hatchType: null},
    {sw: COLORS[5], rng: '30–100%', ext: TEXTS.legendCriticalLabel, hatchType: null},
    {sw: COLORS[6], rng: '>100%', ext: TEXTS.legendExtremeLabel, hatchType: null},
    {sw: COLORS[6], rng: 'Hatched', ext: 'State lost jobs overall; industry grew', hatchType: 'extreme'},
  ];
  labels.forEach(l => {
    const div = document.createElement('div');
    div.className = 'lt';
    let swatchStyle = `background:${l.sw};`;
    if (l.hatchType === 'extreme') {
      // White stripes on red base — match map direction (-45deg)
      swatchStyle += ` background-image: repeating-linear-gradient(-45deg, rgba(255,255,255,0.45) 0px, rgba(255,255,255,0.45) 2px, transparent 2px, transparent 6px); border: 1px solid rgba(0,0,0,0.1);`;
    } else if (l.hatchType === 'declining') {
      // Dark stripes on white base — match map direction (45deg)
      swatchStyle += ` background-image: repeating-linear-gradient(45deg, rgba(60,60,60,0.55) 0px, rgba(60,60,60,0.55) 2px, transparent 2px, transparent 6px); border: 1px solid rgba(0,0,0,0.2);`;
    }
    div.innerHTML = `<div class="lt-sw" style="${swatchStyle}"></div>
                     <div class="lt-rng">${l.rng}</div>` +
                    (l.ext ? `<div class="lt-ext">${l.ext}</div>` : '');
    tiersEl.appendChild(div);
  });
}
renderLegend();

// =============================================================================
// Slider + animation
// =============================================================================
const qtrSlider = document.getElementById('qtr-slider');
const qtrDisplay = document.getElementById('qtr-display');
const ticksEl = document.getElementById('ticks');
const playBtn = document.getElementById('play-btn');

let animationTimer = null;
let animationSpeedMs = 400;
let isPlaying = false;

function startAnimation() {
  isPlaying = true;
  playBtn.classList.add('playing');
  playBtn.textContent = '❚❚';
  playBtn.setAttribute('aria-label', TEXTS.labelPause);

  if (currentEndIdx >= parseInt(qtrSlider.max)) {
    currentEndIdx = parseInt(qtrSlider.min);
    qtrSlider.value = currentEndIdx;
    updateQtrDisplay();
    update();
  }

  animationTimer = setInterval(() => {
    if (currentEndIdx >= parseInt(qtrSlider.max)) {
      stopAnimation();
      return;
    }
    currentEndIdx += 1;
    qtrSlider.value = currentEndIdx;
    updateQtrDisplay();
    update();
  }, animationSpeedMs);
}

function stopAnimation() {
  isPlaying = false;
  playBtn.classList.remove('playing');
  playBtn.textContent = '▶';
  playBtn.setAttribute('aria-label', TEXTS.labelPlay);
  if (animationTimer) {
    clearInterval(animationTimer);
    animationTimer = null;
  }
}

playBtn.addEventListener('click', () => {
  if (isPlaying) stopAnimation();
  else startAnimation();
});

document.querySelectorAll('.speed-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.speed-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    animationSpeedMs = parseInt(p.dataset.s);
    if (isPlaying) {
      stopAnimation();
      startAnimation();
    }
  });
});

function updateSliderRange() {
  qtrSlider.min = currentPeriod;
  qtrSlider.max = NUM_Q - 1;
  if (parseInt(qtrSlider.value) < parseInt(qtrSlider.min)) {
    qtrSlider.value = qtrSlider.min;
  }
  currentEndIdx = parseInt(qtrSlider.value);
  updateQtrDisplay();
  drawTicks();
}

function updateQtrDisplay() {
  const startQid = QS[currentEndIdx - currentPeriod];
  const endQid = QS[currentEndIdx];
  qtrDisplay.textContent = qidLabel(startQid) + ' → ' + qidLabel(endQid);
}

function drawTicks() {
  ticksEl.innerHTML = '';
  const minIdx = parseInt(qtrSlider.min);
  const maxIdx = parseInt(qtrSlider.max);
  const range = maxIdx - minIdx;
  if (range <= 0) return;
  const yearsShown = new Set();
  for (let i = minIdx; i <= maxIdx; i++) {
    const qid = QS[i];
    if (qid % 10 === 1) yearsShown.add(Math.floor(qid / 10));
  }
  const years = Array.from(yearsShown).sort();
  const step = Math.max(1, Math.ceil(years.length / 6));
  years.forEach((y, idx) => {
    if (idx % step !== 0 && idx !== years.length - 1) return;
    const qid = y * 10 + 1;
    const qIdx = QS.indexOf(qid);
    if (qIdx < minIdx) return;
    const pct = ((qIdx - minIdx) / range) * 100;
    const t = document.createElement('div');
    t.className = 'tick';
    t.style.left = pct + '%';
    t.textContent = y;
    ticksEl.appendChild(t);
  });
}

qtrSlider.addEventListener('input', () => {
  stopAnimation();
  currentEndIdx = parseInt(qtrSlider.value);
  updateQtrDisplay();
  update();
});

sel.addEventListener('change', e => {
  stopAnimation();
  currentGroup = e.target.value;
  update();
});

// =============================================================================
// D3 map setup with inlined or CDN topology
// =============================================================================
const svg = d3.select('#map').append('svg')
  .attr('viewBox', '0 0 960 580')
  .attr('width', '100%')
  .style('display', 'block');

const projection = d3.geoAlbersUsa().scale(1180).translate([480, 290]);
const path = d3.geoPath(projection);
let pathsSel = null;

function renderMap(us) {
  // Define hatch pattern for extreme-reliance states (state lost jobs, industry grew)
  const defs = svg.append('defs');
  defs.append('pattern')
    .attr('id', 'hatch-extreme')
    .attr('patternUnits', 'userSpaceOnUse')
    .attr('width', 6)
    .attr('height', 6)
    .attr('patternTransform', 'rotate(45)')
    .append('line')
      .attr('x1', 0).attr('y1', 0)
      .attr('x2', 0).attr('y2', 6)
      .attr('stroke', 'rgba(255,255,255,0.45)')
      .attr('stroke-width', 2.5);

  // Hatch pattern for industry-declining states (industry shrank over the window)
  // Dark stripes on white base, OPPOSITE diagonal direction from hatch-extreme
  // so the two hatched groups are visually distinguishable.
  defs.append('pattern')
    .attr('id', 'hatch-declining')
    .attr('patternUnits', 'userSpaceOnUse')
    .attr('width', 6)
    .attr('height', 6)
    .attr('patternTransform', 'rotate(-45)')
    .append('line')
      .attr('x1', 0).attr('y1', 0)
      .attr('x2', 0).attr('y2', 6)
      .attr('stroke', 'rgba(60,60,60,0.55)')
      .attr('stroke-width', 2.5);

  const features = topojson.feature(us, us.objects.states).features;
  pathsSel = svg.selectAll('path.state')
    .data(features)
    .join('path')
    .attr('class', 'state')
    .attr('d', path)
    .on('click', (event, d) => {
      const name = d.properties.name;
      if (DATA.s[name]) {
        if (selectedState === name) {
          // tap selected state again to deselect
          selectedState = null;
        } else {
          selectedState = name;
        }
        update();
      }
    });

  // Hatch overlay paths — rendered on top of fill paths, pointer-events disabled
  svg.selectAll('path.hatch-overlay')
    .data(features)
    .join('path')
    .attr('class', 'hatch-overlay')
    .attr('d', path)
    .attr('fill', 'none')
    .attr('pointer-events', 'none')
    .attr('stroke', 'none');

  update();
}

if (TOPOLOGY_INLINE) {
  // Use inlined topology directly
  renderMap(TOPOLOGY_INLINE);
} else {
  // Fall back to fetching from CDN
  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
    .then(renderMap)
    .catch(err => {
      document.getElementById('map').innerHTML =
        '<div style="padding:20px;color:var(--text-secondary);">Map topology failed to load: ' +
        err.message + '</div>';
    });
}

// =============================================================================
// Update everything on filter changes
// =============================================================================
function update() {
  if (pathsSel) {
    pathsSel.attr('fill', d => {
      const name = d.properties.name;
      if (DQ_FLAGS.includes(name)) return isDarkMode() ? MISSING_DARK : MISSING_LIGHT;
      const r = getValue(name, currentGroup, currentPeriod, currentEndIdx);
      return getColor(r?.share_of_growth, r?.extreme_reliance, r?.declining_industry);
    });
    pathsSel.classed('selected', d => d.properties.name === selectedState);

    // Apply hatch overlays:
    //   - hatch-extreme (white stripes on red): state lost jobs, industry grew
    //   - hatch-declining (dark stripes on white): state grew, industry shrank
    svg.selectAll('path.hatch-overlay').attr('fill', d => {
      const name = d.properties.name;
      if (DQ_FLAGS.includes(name)) return 'none';
      const r = getValue(name, currentGroup, currentPeriod, currentEndIdx);
      if (r?.extreme_reliance) return 'url(#hatch-extreme)';
      if (r?.declining_industry) return 'url(#hatch-declining)';
      return 'none';
    });
  }

  const startQid = QS[currentEndIdx - currentPeriod];
  const endQid = QS[currentEndIdx];
  const periodYr = currentPeriod / 4;

  document.getElementById('legend-title-metric').textContent =
    '% of state job growth from ' + currentGroup + ', ' +
    qidLabel(startQid) + ' → ' + qidLabel(endQid) +
    ' (' + periodYr + '-yr window)';

  renderDetailPanel();
}

// =============================================================================
// Detail panel — state-specific when selected, national summary otherwise
// =============================================================================
function renderDetailPanel() {
  const el = document.getElementById('detail');
  if (selectedState) {
    el.innerHTML = renderStateDetail(selectedState);
    renderTrendChart(selectedState);
  } else {
    el.innerHTML = renderNationalSummary();
  }
}

function renderNationalSummary() {
  // The detail panel default state — shown when no state is selected.
  // We deliberately don't compute or display a national-level summary here,
  // because summing state-level CES totals diverges meaningfully from BLS's
  // direct national CES estimate (state-level CES drifts between annual
  // benchmarks). The state-level math used elsewhere in the viz is
  // internally consistent — only a national rollup would be misleading.
  return `
    <div class="detail-body" style="color:var(--text-secondary);text-align:center;padding:20px 0;">
      ${TEXTS.nationalSummaryPrompt}
    </div>
  `;
}

function renderStateDetail(name) {
  const sd = DATA.s[name];
  const gArr = sd.g[currentGroup];
  const r = getValue(name, currentGroup, currentPeriod, currentEndIdx);

  const periodYr = currentPeriod / 4;
  const startQid = QS[currentEndIdx - currentPeriod];
  const endQid = QS[currentEndIdx];

  // Job change excluding the selected industry — what the state would have
  // looked like without this sector's contribution (or drag).
  const nonIndDelta = (r && r.tot_delta != null && r.ind_delta != null)
    ? r.tot_delta - r.ind_delta
    : null;

  let callout = '';
  if (r && r.tot_delta != null && r.ind_delta != null) {
    let calloutTpl = '';
    if (r.extreme_reliance) {
      calloutTpl = TEXTS.calloutIndustryOnlyGrowth;
    } else if (r.declining_industry && r.tot_delta < 0 && r.ind_delta < 0) {
      // Both shrank — more specific message than generic industry-declining.
      calloutTpl = TEXTS.calloutBothShrank;
    } else if (r.declining_industry) {
      calloutTpl = TEXTS.calloutIndustryDeclining;
    } else if (r.share_of_growth > 1) {
      calloutTpl = TEXTS.calloutExceedsTotal;
    }
    if (calloutTpl) {
      callout = '<div class="tt-callout">' + calloutTpl.replace('{industry}', currentGroup) + '</div>';
    }
  }

  // Replace the "% of state job growth" card with a special label for
  // extreme reliance (>100%) or industry-declining (industry shrank while
  // state grew) — showing a raw percentage in those cases is misleading.
  let sogDisplay;
  if (r?.extreme_reliance) {
    sogDisplay = `<span class="sv extreme">${TEXTS.tooltipExtremeLabel}</span>`;
  } else if (r?.declining_industry) {
    sogDisplay = `<span class="sv extreme">${TEXTS.tooltipDecliningLabel}</span>`;
  } else {
    sogDisplay = `<span class="sv">${fmtPct(r?.share_of_growth)}</span>`;
  }

  const deltaClass = (v) => v == null ? '' : (v >= 0 ? 'pos' : 'neg');

  return `
    <div class="detail-name">${name}</div>
    <div class="detail-meta">${currentGroup} · ${qidLabel(startQid)} → ${qidLabel(endQid)}</div>
    <div class="stat-grid">
      <div>
        <div class="sl">${TEXTS.tooltipShareOfGrowth}<br/>(${periodYr}-yr window)</div>
        ${sogDisplay}
      </div>
      <div>
        <div class="sl">${TEXTS.tooltipShareOfTotal}<br/>(${periodYr}-yr avg)</div>
        <div class="sv">${fmtPct(r?.share_total_avg)}</div>
      </div>
      <div>
        <div class="sl">${TEXTS.tooltipIndustryJobs}<br/>(${periodYr}-yr avg)</div>
        <div class="sv">${fmtN(r?.ind_emp_avg)}</div>
      </div>
      <div>
        <div class="sl">${TEXTS.tooltipIndustryGrowth}<br/>(${periodYr}-yr)</div>
        <div class="sv">${fmtPct(r?.ind_pct_growth)}</div>
      </div>
    </div>
    <div class="tt-breakdown">
      <div class="tt-bd-row">
        <span class="tt-bd-label">${TEXTS.tooltipIndustryDelta} (${periodYr}-yr)</span>
        <span class="tt-bd-val ${deltaClass(r?.ind_delta)}">${fmtDelta(r?.ind_delta)}</span>
      </div>
      <div class="tt-bd-row">
        <span class="tt-bd-label">${TEXTS.tooltipStateDelta} (${periodYr}-yr)</span>
        <span class="tt-bd-val ${deltaClass(r?.tot_delta)}">${fmtDelta(r?.tot_delta)}</span>
      </div>
      <div class="tt-bd-row">
        <span class="tt-bd-label">${TEXTS.tooltipNonindustryDelta.replace('{industry}', currentGroup)} (${periodYr}-yr)</span>
        <span class="tt-bd-val ${deltaClass(nonIndDelta)}">${fmtDelta(nonIndDelta)}</span>
      </div>
      ${callout}
    </div>
    <div class="tt-chart-label">${TEXTS.tooltipTrendChartLabel}</div>
    <svg id="tt-chart" viewBox="0 0 960 180"></svg>
    <div class="mobile-only-disclaimer">${TEXTS.mobileTrendDisclaimer}</div>
  `;
}

function renderTrendChart(name) {
  const sd = DATA.s[name];
  const gArr = sd.g[currentGroup];
  const chart = document.getElementById('tt-chart');
  if (!chart || !gArr) return;

  // viewBox is 960 x 180 (16:3 aspect ratio).
  // Reserve left/right padding for line endpoints, top room for the end-value label,
  // and bottom space for x-axis labels.
  const VB_W = 960, VB_H = 180;
  const PAD_L = 48, PAD_R = 12;  // wider left margin for y-axis labels
  const PLOT_TOP = 36, PLOT_BOTTOM = 144;
  const LABEL_Y = 168;
  const STROKE_LINE = 2.2;
  const DOT_R = 4;
  const FONT_LABEL = 14;
  const FONT_VALUE = 16;

  const validIdx = [];
  for (let i = 0; i < gArr.length; i++) {
    if (gArr[i] > 0 && sd.t[i] > 0) validIdx.push(i);
  }
  if (validIdx.length === 0) return;

  const emps = validIdx.map(i => gArr[i]);
  const mn = Math.min(...emps), mxv = Math.max(...emps);
  const yr = Math.max(mxv - mn, 1);
  const xr = validIdx[validIdx.length - 1] - validIdx[0];
  const plotW = VB_W - PAD_L - PAD_R;
  const plotH = PLOT_BOTTOM - PLOT_TOP;
  const pts = validIdx.map((qi, i) => [
    ((qi - validIdx[0]) / xr) * plotW + PAD_L,
    PLOT_BOTTOM - ((emps[i] - mn) / yr) * plotH
  ]);

  const sQIdx = currentEndIdx - currentPeriod;
  const eQIdx = currentEndIdx;
  const sPlotIdx = validIdx.indexOf(sQIdx);
  const ePlotIdx = validIdx.indexOf(eQIdx);

  // Window highlight
  if (sPlotIdx >= 0 && ePlotIdx >= 0) {
    const sx = pts[sPlotIdx][0], ex = pts[ePlotIdx][0];
    const hl = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    hl.setAttribute('x', sx); hl.setAttribute('y', PLOT_TOP);
    hl.setAttribute('width', ex - sx); hl.setAttribute('height', plotH);
    hl.setAttribute('fill', '#A50F15');
    hl.setAttribute('fill-opacity', '0.1');
    chart.appendChild(hl);
  }

  // Area
  let ap = `M ${pts[0][0]} ${PLOT_BOTTOM}`;
  pts.forEach(p => ap += ` L ${p[0]} ${p[1]}`);
  ap += ` L ${pts[pts.length-1][0]} ${PLOT_BOTTOM} Z`;
  const a = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  a.setAttribute('d', ap);
  a.setAttribute('fill', '#A50F15');
  a.setAttribute('fill-opacity', '0.18');
  chart.appendChild(a);

  // Line
  let lp = `M ${pts[0][0]} ${pts[0][1]}`;
  pts.forEach((p, i) => { if (i > 0) lp += ` L ${p[0]} ${p[1]}`; });
  const l = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  l.setAttribute('d', lp);
  l.setAttribute('fill', 'none');
  l.setAttribute('stroke', '#A50F15');
  l.setAttribute('stroke-width', STROKE_LINE);
  l.setAttribute('stroke-linejoin', 'round');
  chart.appendChild(l);

  // Endpoint dots for the selected window
  [sPlotIdx, ePlotIdx].forEach(idx => {
    if (idx < 0) return;
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', pts[idx][0]); c.setAttribute('cy', pts[idx][1]);
    c.setAttribute('r', DOT_R); c.setAttribute('fill', '#A50F15');
    chart.appendChild(c);
  });

  // Axis labels — endpoints + window markers with overlap-avoidance
  const SHORT_WINDOW = currentPeriod <= 8;
  const candidates = [];
  if (ePlotIdx >= 0) candidates.push({ qid: QS[eQIdx], pidx: ePlotIdx, prio: 5 });
  if (sPlotIdx >= 0 && !SHORT_WINDOW) candidates.push({ qid: QS[sQIdx], pidx: sPlotIdx, prio: 4 });
  candidates.push({ qid: QS[validIdx[0]], pidx: 0, prio: 3 });
  candidates.push({ qid: QS[validIdx[validIdx.length-1]], pidx: pts.length-1, prio: 2 });

  const byQid = new Map();
  candidates.forEach(c => {
    const ex = byQid.get(c.qid);
    if (!ex || ex.prio < c.prio) byQid.set(c.qid, c);
  });
  const sorted = Array.from(byQid.values()).sort((a, b) => b.prio - a.prio);
  const MIN_GAP = 80;  // pixels (in viewBox units) between label centers
  const placed = [];
  sorted.forEach(c => {
    const x = pts[c.pidx][0];
    if (placed.every(p => Math.abs(p.x - x) >= MIN_GAP)) {
      placed.push({ ...c, x });
    }
  });

  placed.sort((a, b) => a.x - b.x).forEach(c => {
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    const anchor = c.pidx === 0 ? 'start' : c.pidx === pts.length-1 ? 'end' : 'middle';
    t.setAttribute('x', c.x); t.setAttribute('y', LABEL_Y);
    t.setAttribute('text-anchor', anchor);
    t.setAttribute('font-size', FONT_LABEL);
    t.setAttribute('fill', 'rgba(128,128,128,0.85)');
    t.textContent = qidShort(c.qid);
    chart.appendChild(t);
  });

  // Y-axis gridlines and labels
  const Y_TICKS = 3;  // number of horizontal gridlines (min, mid, max)
  const Y_LABEL_X = PAD_L - 4;  // just left of the plot area
  for (let ti = 0; ti < Y_TICKS; ti++) {
    const frac = ti / (Y_TICKS - 1);
    const yVal = mn + frac * yr;
    const yPx = PLOT_BOTTOM - frac * plotH;
    // Gridline
    const gl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    gl.setAttribute('x1', PAD_L); gl.setAttribute('x2', VB_W - PAD_R);
    gl.setAttribute('y1', yPx); gl.setAttribute('y2', yPx);
    gl.setAttribute('stroke', 'rgba(128,128,128,0.18)');
    gl.setAttribute('stroke-width', '1');
    chart.insertBefore(gl, chart.firstChild);  // draw behind everything
    // Label
    const yt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    const yLabel = yVal >= 1000 ? (yVal/1000).toFixed(0)+'k' : Math.round(yVal).toString();
    yt.setAttribute('x', Y_LABEL_X);
    yt.setAttribute('y', yPx + (ti === Y_TICKS - 1 ? 11 : ti === 0 ? 4 : 4));
    yt.setAttribute('text-anchor', 'end');
    yt.setAttribute('font-size', FONT_LABEL);
    yt.setAttribute('fill', 'rgba(128,128,128,0.75)');
    yt.setAttribute('dominant-baseline', ti === 0 ? 'hanging' : ti === Y_TICKS - 1 ? 'auto' : 'middle');
    yt.textContent = yLabel;
    chart.appendChild(yt);
  }

  // End-value label
  const ev = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  ev.setAttribute('x', pts[pts.length-1][0] - 6);
  ev.setAttribute('y', pts[pts.length-1][1] - 14);
  ev.setAttribute('text-anchor', 'end');
  ev.setAttribute('font-size', FONT_VALUE);
  ev.setAttribute('font-weight', '600');
  ev.setAttribute('fill', '#A50F15');
  const ev_val = emps[emps.length-1];
  ev.textContent = ev_val >= 1000 ? (ev_val/1000).toFixed(0)+'k' : ev_val;
  chart.appendChild(ev);
}

// =============================================================================
// Initialize
// =============================================================================
updateSliderRange();
update();
</script>

</body>
